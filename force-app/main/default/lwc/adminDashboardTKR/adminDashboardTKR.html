<template>
    <div class="admin-page">

        <!-- Header with period tabs -->
        <div class="admin-header">
            <h1 class="page-title">Admin Dashboard</h1>
            <div class="period-tabs">
                <button class={dailyTabClass}   data-period="TODAY"     onclick={handleTabClick}>Daily</button>
                <button class={weeklyTabClass}  data-period="THIS_WEEK" onclick={handleTabClick}>Weekly</button>
                <button class={allTimeTabClass} data-period="ALL_TIME"  onclick={handleTabClick}>All Time</button>
            </div>
        </div>

        <!-- Overview stats -->
        <div class="section-card">
            <h2 class="section-title">Overview</h2>
            <c-admin-stats-t-k-r period={activePeriod}></c-admin-stats-t-k-r>
        </div>

        <!-- Order history -->
        <div class="section-card">
            <h2 class="section-title">Order History</h2>
            <c-admin-orders-t-k-r period={activePeriod}></c-admin-orders-t-k-r>
        </div>

        <!-- Menu management -->
        <div class="section-card">
            <h2 class="section-title">Menu Management</h2>
            <p class="section-sub">Click an item name to open its record and edit details. Toggle the Available checkbox and save to update availability.</p>
            <c-admin-menu-t-k-r></c-admin-menu-t-k-r>
        </div>

    </div>
</template>
